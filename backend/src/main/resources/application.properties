spring.application.name=api

# Perfil por defecto en local (IntelliJ / mvn spring-boot:run sin variables).
# En Render/producción: SPRING_PROFILES_ACTIVE=prod
spring.profiles.default=h2

server.port=${PORT:8080}

# JPA (común)
spring.jpa.open-in-view=false

# Carga de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Compresión GZIP
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048

# Catálogo: importar Excel B2B si la BD está vacía
catalog.auto-import=true

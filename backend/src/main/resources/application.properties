# Configuración Principal - Usando H2 (Base de Datos en Memoria)
# Esta configuración funciona sin necesidad de instalar PostgreSQL
# Los datos se reinician cada vez que se detiene la aplicación
# Para cambiar a PostgreSQL, comenta estas líneas y descomenta las de abajo

spring.application.name=api

# H2 Database (Base de Datos en Archivo - Los datos se guardan entre reinicios)
spring.datasource.url=jdbc:h2:file:./data/tzompcomerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Interfaz Web para Ver la Base de Datos)
# Acceder en: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Carga de Archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Configuración H2 (Base de Datos en Memoria)
# Esta configuración permite probar el sistema sin PostgreSQL
# Los datos se pierden al detener la aplicación

spring.application.name=api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:tzompcomerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (interfaz web para ver la base de datos)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
